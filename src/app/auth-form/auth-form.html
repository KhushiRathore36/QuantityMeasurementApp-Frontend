<div class="auth-wrapper">

  <div class="auth-card">

    <h2>Login Form</h2>

    <!-- Tabs -->
    <div class="tab-buttons">
      <button [class.active]="isLogin" (click)="isLogin=true">Login</button>
      <button [class.active]="!isLogin" (click)="isLogin=false">Signup</button>
    </div>

    <!-- LOGIN -->
    <form *ngIf="isLogin" (ngSubmit)="handleLogin()">
      <input type="text" [(ngModel)]="username" name="username" placeholder="Username" required />
      <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required />

      <button class="primary-btn">Login</button>
    </form>

    <form *ngIf="!isLogin" (ngSubmit)="handleSignup()">
      <input type="text" [(ngModel)]="username" name="username" placeholder="Username" required />
      <input type="password" [(ngModel)]="password" name="password" placeholder="Password" required />

      <button class="primary-btn">Signup</button>
    </form>

  </div>

</div>
